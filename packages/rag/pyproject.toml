[project]
name = "ai-platform-rag"
version = "0.1.0"
description = "RAG Service - document retrieval and context injection"
requires-python = ">=3.11"
dependencies = [
    "ai-platform-core",
    "chromadb>=1.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_platform.rag*"]
