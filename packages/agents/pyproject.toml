[project]
name = "ai-platform-agents"
version = "0.1.0"
description = "Agent Orchestrator - LangGraph-based agent execution"
requires-python = ">=3.11"
dependencies = [
    "ai-platform-core",
    "ai-platform-tools",
    "ai-platform-rag",
    "ai-platform-policy",
    "langchain-core>=0.3.0",
    "langchain-openai>=0.2.0",
    "langgraph>=0.2.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_platform.agents*"]
