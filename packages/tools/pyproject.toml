[project]
name = "ai-platform-tools"
version = "0.1.0"
description = "Tool Gateway - MCP-style tool registry and execution"
requires-python = ">=3.11"
dependencies = [
    "ai-platform-core",
    "langchain-core>=0.3.0",
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["ai_platform.tools*"]
