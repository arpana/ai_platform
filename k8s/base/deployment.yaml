apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-api
  namespace: ai-platform
  labels:
    app: ai-platform-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-platform-api
  template:
    metadata:
      labels:
        app: ai-platform-api
    spec:
      containers:
        - name: ai-platform-api
          image: ai-platform-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-platform-config
            - secretRef:
                name: ai-platform-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: chroma-data
              mountPath: /app/data/chroma
      volumes:
        - name: chroma-data
          emptyDir: {}
